<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>爆裂！うんこインベーダー</title>
    <style>
        :root { --stage-scale: 1; color-scheme: dark; }
        * { box-sizing: border-box; }
        html, body { margin: 0; min-height: 100%; }
        body {
            min-height: 100svh;
            text-align: center;
            font-family: sans-serif;
            background: #050505;
            color: #fff;
            padding: max(6px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
            user-select: none;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        #score-box {
            width: min(100%, 420px);
            font-size: clamp(12px, 3.4vw, 17px);
            color: #ffeb3b;
            background: #111;
            margin: 0 auto 6px;
            border-radius: 8px;
            border: 1px dashed #ffeb3b;
            padding: 6px;
            font-weight: bold;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 4px 10px;
        }
        #score-box span { white-space: nowrap; }
        #rank-badge { color: #00ffcc; }
        .stage-column { display: flex; flex-direction: column; align-items: center; width: min(100%, 96vw); min-width: 0; margin: 0 auto; }
        .stage-shell {
            position: relative;
            width: 400px;
            height: 420px;
            flex: 0 0 auto;
        }
        #stage {
            background: #1a0f00;
            height: 420px;
            width: 400px;
            border: 4px solid #ffeb3b;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            margin: 0;
            transform: scale(var(--stage-scale));
            transform-origin: top left;
            touch-action: none;
        }

        #q-box {
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            z-index: 9;
            background: rgba(0,0,0,0.62);
            border: 1px solid #ffeb3b;
            border-radius: 6px;
            padding: 3px 4px;
            font-size: clamp(18px, 6.2vw, 24px);
            font-weight: bold;
            line-height: 1.15;
            min-height: 30px;
            pointer-events: none;
        }

        #hint-box {
            position: absolute;
            top: 38px;
            left: 4px;
            right: 4px;
            z-index: 8;
            font-size: 13px;
            color: #ffeb3b;
            background: rgba(38,20,0,0.85);
            padding: 3px 4px;
            border-radius: 6px;
            border: 1px dashed #9c27b0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: nowrap;
            overflow: hidden;
            gap: 1px;
            min-height: 22px;
            pointer-events: none;
        }
        .hint-sign { color: #ffeb3b; font-weight: bold; margin: 0 3px; font-size: 13px; flex: 0 0 auto; }
        .poop-container { display: flex; flex-wrap: nowrap; gap: 1px; flex: 0 0 auto; }
        .poop-item { display: flex; justify-content: center; align-items: center; flex: 0 0 auto; }
        .poop-remove { opacity: 0.32; position: relative; }
        .poop-remove::after { content: "✕"; position: absolute; color: #ff5252; font-size: 10px; font-weight: bold; }

        #msg {
            position: absolute;
            bottom: 4px;
            left: 4px;
            right: 4px;
            z-index: 9;
            font-size: clamp(11px, 3.3vw, 14px);
            font-weight: bold;
            color: #ffeb3b;
            background: rgba(0,0,0,0.62);
            border-radius: 6px;
            padding: 3px 4px;
            min-height: 20px;
            line-height: 1.25;
            pointer-events: none;
        }

        #combo-badge {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.6);
            z-index: 11;
            font-size: 28px;
            font-weight: bold;
            color: #ff9800;
            text-shadow: 0 0 8px #000, 0 0 14px #ffeb3b;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s, transform 0.15s;
            white-space: nowrap;
        }
        #combo-badge.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #player { position: absolute; bottom: 34px; left: 180px; font-size: 40px; z-index: 5; transition: transform 0.1s, filter 0.3s; }
        #player.rank0 { filter: none; }
        #player.rank1 { filter: drop-shadow(0 0 6px #ffeb3b); }
        #player.rank2 { filter: drop-shadow(0 0 10px #ff9800) drop-shadow(0 0 4px #ff5722); }
        #player.rank3 { filter: drop-shadow(0 0 8px #ff00ea) drop-shadow(0 0 12px #00e5ff) drop-shadow(0 0 16px #ffeb3b); }

        #laser, .e-laser { position: absolute; font-size: 24px; z-index: 4; }
        .e-laser { font-size: 30px; }
        .weapon-giant { font-size: 46px !important; }
        #invader-army { position: absolute; top: 76px; left: 0; right: 0; height: 100px; }
        .invader { font-size: 55px; text-align: center; font-weight: bold; position: absolute; transition: filter 0.2s; }
        /* ★レインボーうんこボーナス演出 */
        .invader.rainbow {
            animation: rainbowGlow 1s linear infinite;
        }
        @keyframes rainbowGlow {
            0%   { filter: drop-shadow(0 0 6px #ff0000); }
            20%  { filter: drop-shadow(0 0 6px #ff9800); }
            40%  { filter: drop-shadow(0 0 6px #ffeb3b); }
            60%  { filter: drop-shadow(0 0 6px #33ff00); }
            80%  { filter: drop-shadow(0 0 6px #00bfff); }
            100% { filter: drop-shadow(0 0 6px #cc00ff); }
        }
        .inv-badge { font-size: 14px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.8); border: 1px solid #ffeb3b; padding: 2px 6px; border-radius: 4px; display: block; margin-top: -5px; }
        .inv-badge.rainbow-badge { border-color: #ff00ea; color: #ffeb3b; }
        .splash-poop { position: absolute; font-size: 30px; z-index: 10; pointer-events: none; }
        .big-poop { position: absolute; font-size: 130px; z-index: 6; line-height: 1; pointer-events: none; }
        .weapon-spark { position: absolute; width: 8px; height: 8px; border-radius: 50%; z-index: 9; pointer-events: none; box-shadow: 0 0 10px currentcolor; }
        #touch-controls {
            display: grid;
            grid-template-columns: 1fr 1.15fr 1fr;
            gap: 10px;
            width: min(100%, 420px);
            margin: 8px auto 0;
            touch-action: none;
        }
        .control-button {
            min-height: 56px;
            border: 2px solid #ffeb3b;
            border-radius: 8px;
            background: #171717;
            color: #ffeb3b;
            font: inherit;
            font-size: 28px;
            font-weight: bold;
            line-height: 1;
            box-shadow: inset 0 -3px 0 rgba(255, 235, 59, 0.16);
        }
        .control-button:active,
        .control-button.is-pressed {
            background: #392b00;
            transform: translateY(1px);
        }
        .control-button.fire {
            color: #fff;
            background: #8d1c00;
            border-color: #ff9800;
        }
        @media (hover: hover) and (pointer: fine) {
            #touch-controls { display: none; }
        }
        @media (max-width: 400px) {
            .control-button { min-height: 50px; font-size: 24px; }
        }
        @media (max-height: 620px) {
            #score-box { padding: 4px; margin-bottom: 4px; }
            #touch-controls { margin-top: 4px; }
        }
    </style>
</head>
<body>
<div id="score-box">
    <span id="now-score">SCORE: 0000</span>
    <span id="best-score" style="color:#ff5722;">🏆MAX: 0000</span>
    <span id="rank-badge">🌱 うんこ見習い</span>
</div>
<div class="stage-column">
    <div id="stage-shell" class="stage-shell">
        <div id="stage">
            <div id="q-box"><div id="question"></div></div>
            <div id="hint-box">💩</div>
            <div id="invader-army"></div>
            <div id="laser" style="display:none;">🔥</div>
            <div id="player" class="rank0">🚀</div>
            <div id="combo-badge"></div>
            <div id="msg">【←】【→】または下のボタンで移動！【スペース】/🔥で発射！</div>
        </div>
    </div>
    <div id="touch-controls" aria-label="スマホ操作">
        <button class="control-button" type="button" data-control="left" aria-label="左へ移動">←</button>
        <button class="control-button fire" type="button" data-control="fire" aria-label="ビーム発射">🔥</button>
        <button class="control-button" type="button" data-control="right" aria-label="右へ移動">→</button>
    </div>
</div>
<script>
    let ans = 0, pX = 182, active = true, score = 0, bulletActive = false, attackTimer = null, audioCtx = null, invadersData = []; 
    let highScore = localStorage.getItem('unko_max') ? parseInt(localStorage.getItem('unko_max')) : 0;
    let comboCount = 0, currentRankIdx = 0, currentOp = '+';
    let rankXP = 0; // ★正解数の累積（ミスしても減らない・ランク判定専用）
    let isRainbowRound = false; // ★このラウンドの正解がレインボーかどうか
    const keysPressed = {}, $ = id => document.getElementById(id);
    const STAGE_W = 400, STAGE_H = 420, INV_TOP = 78;
    const RAINBOW_CHANCE = 0.12;
    const NEAR_MISS_THRESHOLD = 2;

    // ★ランク閾値は「正解数」基準（ミスで下がらないため間隔が意味を持つ）
    const RANKS = [
        { min: 0,  label: "🌱 うんこ見習い",        opTypes: ['+'],      range: [2, 9]  },
        { min: 6,  label: "💪 うんこ戦士",          opTypes: ['+','-'],  range: [2, 9]  },
        { min: 15, label: "🔥 うんこマスター",       opTypes: ['+','-'],  range: [2, 14] },
        { min: 28, label: "👑 伝説のうんこハンター", opTypes: ['+','-'],  range: [2, 20] }
    ];
    const WEAPONS = ['🔥', '⚡', '💥', '💩'];

    function getRankIndex(xp) {
        let idx = 0;
        for (let i = 0; i < RANKS.length; i++) { if (xp >= RANKS[i].min) idx = i; }
        return idx;
    }

    function updateRankDisplay() {
        currentRankIdx = getRankIndex(rankXP);
        $('rank-badge').innerText = RANKS[currentRankIdx].label;
        const p = $('player');
        p.classList.remove('rank0','rank1','rank2','rank3');
        p.classList.add('rank' + currentRankIdx);
    }

    function getComboMultiplier(count) {
        if (count >= 5) return 3;
        if (count >= 3) return 2;
        if (count >= 2) return 1.5;
        return 1;
    }

    function showComboBadge(text) {
        const badge = $('combo-badge');
        badge.innerText = text;
        badge.classList.remove('show');
        void badge.offsetWidth;
        badge.classList.add('show');
        clearTimeout(badge._hideTimer);
        badge._hideTimer = setTimeout(() => badge.classList.remove('show'), 700);
    }

    function resetCombo() { comboCount = 0; }

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    });

    function playSound(f1, f2, type, vol, len) {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator(), gain = audioCtx.createGain(), now = audioCtx.currentTime;
        osc.connect(gain); gain.connect(audioCtx.destination); osc.type = type;
        osc.frequency.setValueAtTime(f1, now); if(f2) osc.frequency.setValueAtTime(f2, now + 0.08);
        gain.gain.setValueAtTime(vol, now); gain.gain.exponentialRampToValueAtTime(0.01, now + len);
        osc.start(now); osc.stop(now + len);
    }

    function playWinSound() {
        if (!audioCtx) return;
        let now = audioCtx.currentTime, notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, idx) => {
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain(), t = now + (idx * 0.08);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, t); gain.gain.setValueAtTime(0.2, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3); osc.start(t); osc.stop(t + 0.3);
        });
    }

    function playComboSound(count) {
        if (!audioCtx) return;
        let now = audioCtx.currentTime, base = 700 + (count * 60);
        for (let i = 0; i < 2; i++) {
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain(), t = now + (i * 0.06);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square';
            osc.frequency.setValueAtTime(base + (i * 150), t); gain.gain.setValueAtTime(0.15, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.12); osc.start(t); osc.stop(t + 0.12);
        }
    }

    function playRainbowSound() {
        if (!audioCtx) return;
        let now = audioCtx.currentTime, notes = [660, 880, 1100, 1320, 1760];
        notes.forEach((freq, idx) => {
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain(), t = now + (idx * 0.06);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, t); gain.gain.setValueAtTime(0.2, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25); osc.start(t); osc.stop(t + 0.25);
        });
    }

    function playRankUpSound() {
        if (!audioCtx) return;
        let now = audioCtx.currentTime, notes = [392, 523.25, 659.25, 880];
        notes.forEach((freq, idx) => {
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain(), t = now + (idx * 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(freq, t); gain.gain.setValueAtTime(0.18, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.35); osc.start(t); osc.stop(t + 0.35);
        });
    }

    function playPuriSound() {
        if (!audioCtx) return;
        let now = audioCtx.currentTime;
        for (let i = 0; i < 3; i++) {
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain(), t = now + (i * 0.08);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'triangle';
            osc.frequency.setValueAtTime(300 + (i * 40), t); osc.frequency.exponentialRampToValueAtTime(150, t + 0.06);
            gain.gain.setValueAtTime(0.15, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.06);
            osc.start(t); osc.stop(t + 0.06);
        }
    }

    function playFartSound() {
        if (!audioCtx) return;
        let now = audioCtx.currentTime;
        for (let i = 0; i < 3; i++) {
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(90 + (i * 15), now); osc.frequency.linearRampToValueAtTime(45, now + 0.5);
            gain.gain.setValueAtTime(0.25, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        }
    }

    function playOshiiSound() {
        if (!audioCtx) return;
        let now = audioCtx.currentTime;
        let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
        osc.frequency.setValueAtTime(440, now); osc.frequency.exponentialRampToValueAtTime(330, now + 0.2);
        gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
    }

    function syncStageScale() {
        const shell = $('stage-shell'), controls = $('touch-controls');
        const viewportW = document.documentElement.clientWidth || window.innerWidth;
        const shellTop = shell.getBoundingClientRect().top;
        const controlsVisible = getComputedStyle(controls).display !== 'none';
        const controlsHeight = controlsVisible ? controls.getBoundingClientRect().height + 12 : 0;
        const widthRoom = viewportW - 16;
        const heightRoom = window.innerHeight - shellTop - controlsHeight - 12;
        const scale = Math.max(0.5, Math.min(2.4, widthRoom / STAGE_W, heightRoom / STAGE_H));
        document.documentElement.style.setProperty('--stage-scale', scale.toFixed(3));
        shell.style.width = (STAGE_W * scale) + 'px';
        shell.style.height = (STAGE_H * scale) + 'px';
    }

    function stopMobileMove() {
        keysPressed.ArrowLeft = false;
        keysPressed.ArrowRight = false;
        document.querySelectorAll('.control-button.is-pressed').forEach(btn => btn.classList.remove('is-pressed'));
    }

    function bindTouchControls() {
        document.querySelectorAll('[data-control]').forEach(btn => {
            const control = btn.dataset.control;
            const key = control === 'left' ? 'ArrowLeft' : 'ArrowRight';

            btn.addEventListener('pointerdown', e => {
                e.preventDefault();
                initAudio();
                btn.classList.add('is-pressed');
                if (btn.setPointerCapture && e.pointerId !== undefined) btn.setPointerCapture(e.pointerId);
                if (control === 'fire') {
                    if (active && !bulletActive) shootLaser();
                    return;
                }
                keysPressed[key] = true;
            });

            const release = e => {
                e.preventDefault();
                btn.classList.remove('is-pressed');
                if (btn.releasePointerCapture && e.pointerId !== undefined) {
                    try { btn.releasePointerCapture(e.pointerId); } catch (_) {}
                }
                if (control !== 'fire') keysPressed[key] = false;
            };
            btn.addEventListener('pointerup', release);
            btn.addEventListener('pointercancel', release);
            btn.addEventListener('lostpointercapture', () => {
                btn.classList.remove('is-pressed');
                if (control !== 'fire') keysPressed[key] = false;
            });
            btn.addEventListener('contextmenu', e => e.preventDefault());
        });
        window.addEventListener('blur', stopMobileMove);
    }

    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ') e.preventDefault();
        initAudio();
        if (e.key === ' ' && active && !bulletActive) shootLaser();
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') keysPressed[e.key] = true;
    });
    window.addEventListener('keyup', e => {
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ') e.preventDefault();
        keysPressed[e.key] = false;
    });
    window.addEventListener('resize', syncStageScale);
    window.addEventListener('orientationchange', syncStageScale);

    setInterval(() => {
        if (!active) return;
        if (keysPressed['ArrowLeft']) pX = Math.max(10, pX - 8);
        if (keysPressed['ArrowRight']) pX = Math.min(350, pX + 8);
        $('player').style.left = pX + 'px';
    }, 1000 / 60);

    function start() {
        active = true; bulletActive = false; $('player').innerText = "🚀"; $('player').style.transform = "rotate(0deg) scale(1)";
        $('player').style.left = pX + 'px';
        $('msg').innerText = "ただしい答えを持つ「うんこ」を撃ち落とせ！";
        $('now-score').innerText = "SCORE: " + String(score).padStart(4, '0');
        $('best-score').innerText = "🏆MAX: " + String(highScore).padStart(4, '0');
        updateRankDisplay();
        document.querySelectorAll('.e-laser, .big-poop').forEach(el => el.remove()); 
        generateInvaders(); clearInterval(attackTimer); attackTimer = setInterval(enemyAutoAttack, 3000);
    }

    function makePoopBlock(num, emoji, totalForSizing, faded) {
        let size = Math.max(9, Math.min(16, Math.floor(300 / Math.max(totalForSizing, 1))));
        let html = "<div class='poop-container'>";
        for (let i = 0; i < num; i++) {
            let cls = faded ? 'poop-item poop-remove' : 'poop-item';
            html += `<div class='${cls}' style="font-size:${size}px;width:${size+2}px;height:${size+2}px;">${emoji}</div>`;
        }
        html += "</div>";
        return html;
    }

    function generateQuestion() {
        const rank = RANKS[currentRankIdx];
        const op = rank.opTypes[Math.floor(Math.random() * rank.opTypes.length)];
        const [lo, hi] = rank.range;
        let n1 = Math.floor(Math.random() * (hi - lo + 1)) + lo;
        let n2 = Math.floor(Math.random() * (hi - lo + 1)) + lo;
        if (op === '-' && n1 < n2) { const t = n1; n1 = n2; n2 = t; }
        const answer = op === '+' ? n1 + n2 : n1 - n2;
        return { n1, n2, op, answer };
    }

    function generateInvaders() {
        const q = generateQuestion();
        ans = q.answer; currentOp = q.op;
        isRainbowRound = Math.random() < RAINBOW_CHANCE; // ★このラウンドはレインボー出現か
        const signDisplay = q.op === '+' ? '＋' : '－';
        $('question').innerText = `${q.n1} ${signDisplay} ${q.n2} ＝ ？`;

        const total = q.n1 + q.n2;
        let hintHTML;
        if (q.op === '+') {
            hintHTML = makePoopBlock(q.n1, "💩", total) + `<div class="hint-sign">＋</div>` + makePoopBlock(q.n2, "✨", total);
        } else {
            hintHTML = makePoopBlock(q.n1 - q.n2, "💩", total) + makePoopBlock(q.n2, "💩", total, true);
        }
        $('hint-box').innerHTML = hintHTML;
        playPuriSound();

        let choices = [ans];
        while (choices.length < 4) {
            let f = ans + (Math.floor(Math.random() * 7) - 3); 
            if (f >= 0 && !choices.includes(f)) choices.push(f);
        }
        choices.sort(() => Math.random() - 0.5);
        $('invader-army').innerHTML = ''; invadersData = []; 
        let pos = [20, 110, 200, 290].sort(() => Math.random() - 0.5);

        choices.forEach((val, i) => {
            let id = `inv_${i}`, rX = pos[i] + (Math.floor(Math.random() * 16) - 8);
            const isBonus = isRainbowRound && val === ans;
            const invClass = isBonus ? 'invader rainbow' : 'invader';
            const badgeClass = isBonus ? 'inv-badge rainbow-badge' : 'inv-badge';
            $('invader-army').innerHTML += `<div id="${id}" class="${invClass}" data-val="${val}" style="left:${rX}px;top:10px;">💩<span class="${badgeClass}">${val}</span></div>`;
            setTimeout(() => { if ($(id)) invadersData.push({ id: id, val: val, left: rX, right: rX + 55, top: INV_TOP, bottom: INV_TOP + 75, bonus: isBonus }); }, 50);
        });
    }

    function launchWeaponAnimation() {
        let colors = ['#ff0055', '#00ffcc', '#ffeb3b', '#ff9800', '#cc00ff', '#33ff00'];
        for (let i = 0; i < 60; i++) {
            let s = document.createElement('div'); s.className = 'weapon-spark';
            let startX = pX + 20, startY = 360; s.style.left = startX + 'px'; s.style.top = startY + 'px';
            s.style.backgroundColor = colors[i % colors.length]; $('stage').appendChild(s);
            let angle = (i / 60) * Math.PI * 2 + (Math.random() * 0.2), speed = Math.random() * 10 + 6;
            let vx = Math.cos(angle) * speed, vy = Math.sin(angle) * speed - 2, cx = startX, cy = startY;
            let sLoop = setInterval(() => {
                vy += 0.2; cx += vx; cy += vy; s.style.left = cx + 'px'; s.style.top = cy + 'px';
                if (cy > 430 || cx < -10 || cx > 410) { clearInterval(sLoop); s.remove(); }
            }, 20);
        }
    }

    function explodePoop(sX, sY, isP = false) {
        let count = isP ? 40 : 30;
        for (let i = 0; i < count; i++) {
            const p = document.createElement('div'); p.className = 'splash-poop'; p.innerText = '💩';
            p.style.left = sX + 'px'; p.style.top = sY + 'px'; $('stage').appendChild(p);
            let vx, vy;
            if (isP) {
                let a = (i / count) * Math.PI * 2 + (Math.random() * 0.5), sp = Math.random() * 8 + 5;
                vx = Math.cos(a) * sp; vy = Math.sin(a) * sp - 3;
            } else { vx = (Math.random() - 0.5) * 14; vy = (Math.random() - 0.8) * 16; }
            let cx = sX, cy = sY;
            let pLoop = setInterval(() => {
                vy += 0.4; cx += vx; cy += vy; p.style.left = cx + 'px'; p.style.top = cy + 'px';
                if (cy > 430 || cx < -30 || cx > 430) { clearInterval(pLoop); p.remove(); }
            }, 20);
        }
    }

    function checkHighScore() { if (score > highScore) { highScore = score; localStorage.setItem('unko_max', highScore); } }

    function shootLaser() {
        bulletActive = true; 
        let lX = pX + 15, lY = 340;
        const laserEl = $('laser');
        laserEl.innerText = WEAPONS[currentRankIdx];
        laserEl.classList.toggle('weapon-giant', currentRankIdx === 3);
        laserEl.style.left = lX + 'px'; laserEl.style.bottom = '80px'; laserEl.style.display = 'block';
        let loop = setInterval(() => {
            lY -= 15; laserEl.style.bottom = (420 - lY) + 'px'; 
            for (let i = 0; i < invadersData.length; i++) {
                let inv = invadersData[i], el = $(inv.id);
                if (!el || el.innerHTML.includes("💥")) continue;
                if (lX >= inv.left - 5 && lX <= inv.right + 5 && lY >= inv.top && lY <= inv.bottom + 15) {
                    clearInterval(loop); laserEl.style.display = 'none'; clearInterval(attackTimer); 
                    if (inv.val === ans) {
                        active = false;
                        const prevRankIdx = currentRankIdx;
                        comboCount++; rankXP++;
                        let multiplier = getComboMultiplier(comboCount);
                        let base = 100 * multiplier;
                        let gain = inv.bonus ? Math.round(base * 2) : Math.round(base);
                        score += gain;
                        playWinSound();
                        if (inv.bonus) playRainbowSound();
                        else if (comboCount >= 2) playComboSound(comboCount);
                        checkHighScore(); updateRankDisplay();
                        if (currentRankIdx > prevRankIdx) playRankUpSound();
                        el.innerHTML = "<span style='font-size:45px;'>💥</span>";
                        if (inv.bonus) {
                            $('msg').innerText = `🌈 レインボーボーナス！！ SCORE +${gain} 🌈`;
                            showComboBadge(`🌈 x2 BONUS！ +${gain}`);
                        } else if (comboCount >= 2) {
                            $('msg').innerText = `✨ ${comboCount}連続ゲキハ！ SCORE +${gain} ✨`;
                            showComboBadge(`COMBO x${comboCount}！ +${gain}`);
                        } else {
                            $('msg').innerText = `✨ ゲキハ成功！ SCORE +${gain} ✨`;
                            showComboBadge(`+${gain}`);
                        }
                        explodePoop(lX, lY, true); launchWeaponAnimation(); setTimeout(start, 1000); 
                    } else {
                        active = false; playFartSound(); $('player').innerText = "🤪💩"; 
                        $('player').style.transform = "rotate(180deg) scale(1.5)";
                        const isNearMiss = Math.abs(inv.val - ans) <= NEAR_MISS_THRESHOLD;
                        if (isNearMiss) {
                            playOshiiSound();
                            $('msg').innerText = "😲 おしい！もう少し！";
                        } else {
                            $('msg').innerText = `💨 ぶりゅりゅ！`;
                        }
                        resetCombo(); score = 0; updateRankDisplay(); explodePoop(lX, lY); setTimeout(start, 2000); 
                    }
                    return;
                }
            }
            if (lY < 0) { clearInterval(loop); laserEl.style.display = 'none'; bulletActive = false; }
        }, 10);
    }

    function enemyAutoAttack() {
        if (!active || invadersData.length === 0) return;
        if (Math.random() < 0.2) {
            clearInterval(attackTimer); $('msg').innerText = "🚨 警告！ ビッグうんち襲来！！ 🚨"; playSound(80, 50, 'sawtooth', 0.3, 0.8);
            const big = document.createElement('div'); big.className = 'big-poop'; big.innerText = "💩";
            let bX = Math.floor(Math.random() * 240) - 20, bY = -140; big.style.left = bX + 'px'; big.style.top = bY + 'px'; $('stage').appendChild(big);
            let bigLoop = setInterval(() => {
                bY += 10; big.style.top = bY + 'px';
                if (bY >= 230 && bY <= 380) {
                    let cX = bX + 65;
                    if (pX + 20 >= cX - 60 && pX + 20 <= cX + 60) {
                        clearInterval(bigLoop); big.remove(); active = false; playSound(60, 30, 'triangle', 0.5, 0.8);
                        $('player').innerText = "💀💩"; $('msg').innerText = "😱 巨大うんちに潰された！";
                        resetCombo(); score = 0; updateRankDisplay(); explodePoop(pX + 20, 300, true); setTimeout(start, 2000); return;
                    }
                }
                if (bY >= 420) { clearInterval(bigLoop); big.remove(); start(); }
            }, 15); return;
        }
        let inv = invadersData[Math.floor(Math.random() * invadersData.length)], el = document.createElement('div');
        el.className = 'e-laser'; el.innerText = "💩"; let eX = inv.left + 15, eY = INV_TOP + 20; el.style.left = eX + 'px'; el.style.top = eY + 'px'; $('stage').appendChild(el);
        let enemyLoop = setInterval(() => {
            eY += 6; el.style.top = eY + 'px';
            if (eY >= 350 && eY <= 380 && eX >= pX - 5 && eX <= pX + 45) {
                clearInterval(enemyLoop); el.remove(); clearInterval(attackTimer); active = false; playSound(100, 40, 'triangle', 0.3, 0.5);
                $('player').innerText = "💀💩"; $('msg').innerText = "💨 上からうんちが落ちてきた！";
                resetCombo(); score = 0; updateRankDisplay(); explodePoop(pX + 20, 360); setTimeout(start, 1500); 
            }
            if (eY >= 420) { clearInterval(enemyLoop); el.remove(); }
        }, 15);
    }
    bindTouchControls();
    syncStageScale();
    start();
</script>
</body>
</html>
