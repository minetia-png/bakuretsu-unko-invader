<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>爆裂！うんこインベーダー（ヒントなし版）</title>
<style>
:root{--s:1;color-scheme:dark}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{min-height:100svh;text-align:center;font-family:sans-serif;background:#050505;color:#fff;padding:6px;user-select:none;overflow-x:hidden;touch-action:manipulation}
#hud{width:min(100%,420px);margin:0 auto 6px;padding:6px;border:1px dashed #ffeb3b;border-radius:8px;background:#111;color:#ffeb3b;font-weight:bold;font-size:clamp(12px,3.4vw,16px);display:flex;justify-content:space-around;flex-wrap:wrap;gap:4px 10px}
#hud span{white-space:nowrap}
#rank{color:#00ffcc}
.col{display:flex;flex-direction:column;align-items:center;width:min(100%,96vw);margin:0 auto}
.shell{position:relative;width:400px;height:460px}
#stage{width:400px;height:460px;position:relative;overflow:hidden;background:#1a0f00;border:4px solid #ffeb3b;border-radius:12px;transform:scale(var(--s));transform-origin:top left;touch-action:none}
#question{position:absolute;top:6px;left:4px;right:4px;z-index:9;padding:6px;border:1px solid #ffeb3b;border-radius:6px;background:rgba(0,0,0,.65);font-size:clamp(22px,7.5vw,30px);font-weight:bold;min-height:40px;line-height:1.2;pointer-events:none}
#msg{position:absolute;bottom:4px;left:4px;right:4px;z-index:9;font-size:clamp(11px,3.3vw,14px);font-weight:bold;color:#ffeb3b;background:rgba(0,0,0,.62);border-radius:6px;padding:3px 4px;min-height:20px;line-height:1.25;pointer-events:none}
#combo{position:absolute;top:52%;left:50%;transform:translate(-50%,-50%) scale(.6);z-index:11;font-size:27px;font-weight:bold;color:#ff9800;text-shadow:0 0 8px #000,0 0 14px #ffeb3b;opacity:0;pointer-events:none;transition:.15s;white-space:nowrap}
#combo.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#player{position:absolute;bottom:36px;left:180px;font-size:40px;z-index:5;transition:transform .1s,filter .3s}
#player.r0{filter:none}
#player.r1{filter:drop-shadow(0 0 6px #ffeb3b)}
#player.r2{filter:drop-shadow(0 0 10px #ff9800) drop-shadow(0 0 4px #ff5722)}
#player.r3{filter:drop-shadow(0 0 8px #ff00ea) drop-shadow(0 0 12px #00e5ff) drop-shadow(0 0 16px #ffeb3b)}
#laser,.eshot{position:absolute;font-size:24px;z-index:4}
.eshot{font-size:30px}
.giant{font-size:46px!important}
#army{position:absolute;top:56px;left:0;right:0;height:100px}
.inv{font-size:55px;text-align:center;font-weight:bold;position:absolute;transition:filter .2s}
.inv.rainbow{animation:rb 1s linear infinite}
@keyframes rb{0%{filter:drop-shadow(0 0 6px #ff0000)}20%{filter:drop-shadow(0 0 6px #ff9800)}40%{filter:drop-shadow(0 0 6px #ffeb3b)}60%{filter:drop-shadow(0 0 6px #33ff00)}80%{filter:drop-shadow(0 0 6px #00bfff)}100%{filter:drop-shadow(0 0 6px #cc00ff)}}
.badge{font-size:14px;font-weight:bold;color:#fff;background:rgba(0,0,0,.8);border:1px solid #ffeb3b;padding:2px 6px;border-radius:4px;display:block;margin-top:-5px}
.badge.rb{border-color:#ff00ea;color:#ffeb3b}
.splash{position:absolute;font-size:30px;z-index:10;pointer-events:none}
.big{position:absolute;font-size:130px;z-index:6;line-height:1;pointer-events:none}
.spark{position:absolute;width:8px;height:8px;border-radius:50%;z-index:9;pointer-events:none;box-shadow:0 0 10px currentColor}
#controls{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:10px;width:min(100%,420px);margin:8px auto 0;touch-action:none}
.cbtn{min-height:56px;border:2px solid #ffeb3b;border-radius:8px;background:#171717;color:#ffeb3b;font:inherit;font-size:28px;font-weight:bold;box-shadow:inset 0 -3px 0 rgba(255,235,59,.16)}
.cbtn:active,.cbtn.press{background:#392b00;transform:translateY(1px)}
.cbtn.fire{color:#fff;background:#8d1c00;border-color:#ff9800}
@media (hover:hover) and (pointer:fine){#controls{display:none}}
@media (max-width:400px){.cbtn{min-height:50px;font-size:24px}}
</style>
</head>
<body>
<div id="hud"><span id="score">SCORE: 0000</span><span id="best" style="color:#ff5722">🏆MAX: 0000</span><span id="rank">🌱 うんこ見習い</span><span id="xp">⭐正解: 0</span></div>
<div class="col">
<div class="shell" id="shell">
<div id="stage">
<div id="question"></div>
<div id="army"></div>
<div id="laser" style="display:none">🔥</div>
<div id="player" class="r0">🚀</div>
<div id="combo"></div>
<div id="msg">【←】【→】または下のボタンで移動！【スペース】/🔥で発射！</div>
</div>
</div>
<div id="controls" aria-label="スマホ操作">
<button class="cbtn" data-k="ArrowLeft">←</button>
<button class="cbtn fire" data-k="fire">🔥</button>
<button class="cbtn" data-k="ArrowRight">→</button>
</div>
</div>
<script>
const $=id=>document.getElementById(id);
const STAGE_W=400,STAGE_H=460,INV_TOP=56;
let ans=0,px=182,active=true,score=0,bulletActive=false,attackTimer=null,audioCtx=null,invadersData=[];
let highScore=0, rankXP=0, sessionCorrect=0, sessionGoal=3, rewardTier=0, dailySeed=0;
let comboCount=0,currentRankIdx=0,isRainbowRound=false;
const keysPressed={};
const RAINBOW_CHANCE=.12,NEAR_MISS=2;

function getDailySeed(){const d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate()}
function isDailyReady(){return dailySeed!==getDailySeed()}
const RANKS=[
 {min:0, label:'🌱 うんこ見習い',       ops:['+'],     range:[2,9]},
 {min:6, label:'💪 うんこ戦士',         ops:['+','-'], range:[2,9]},
 {min:15,label:'🔥 うんこマスター',      ops:['+','-'], range:[2,14]},
 {min:28,label:'👑 伝説のうんこハンター',ops:['+','-'], range:[2,20]}
];
const WEAPONS=['🔥','⚡','💥','💩'];

function getRankIndex(xp){let i=0;for(let k=0;k<RANKS.length;k++)if(xp>=RANKS[k].min)i=k;return i}
function updateRankDisplay(){
  currentRankIdx=getRankIndex(rankXP);
  $('rank').textContent=RANKS[currentRankIdx].label;
  const p=$('player');p.classList.remove('r0','r1','r2','r3');p.classList.add('r'+currentRankIdx);
  $('xp').textContent='⭐正解: '+sessionCorrect+' / '+sessionGoal;
}
function getComboMultiplier(c){return c>=5?3:c>=3?2:c>=2?1.5:1}
function showComboBadge(t){const b=$('combo');b.textContent=t;b.classList.remove('show');void b.offsetWidth;b.classList.add('show');clearTimeout(b._t);b._t=setTimeout(()=>b.classList.remove('show'),700)}
function resetCombo(){comboCount=0}

function initAudio(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&audioCtx&&audioCtx.state==='suspended')audioCtx.resume()});
function playSound(f1,f2,type,vol,len){if(!audioCtx)return;let o=audioCtx.createOscillator(),g=audioCtx.createGain(),now=audioCtx.currentTime;o.connect(g);g.connect(audioCtx.destination);o.type=type;o.frequency.setValueAtTime(f1,now);if(f2)o.frequency.setValueAtTime(f2,now+.08);g.gain.setValueAtTime(vol,now);g.gain.exponentialRampToValueAtTime(.01,now+len);o.start(now);o.stop(now+len)}
function playWinSound(){if(!audioCtx)return;let now=audioCtx.currentTime;[523.25,659.25,783.99,1046.5].forEach((f,i)=>{let o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=now+i*.08;o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.01,t+.3);o.start(t);o.stop(t+.3)})}
function playComboSound(c){if(!audioCtx)return;let now=audioCtx.currentTime,base=700+c*60;for(let i=0;i<2;i++){let o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=now+i*.06;o.connect(g);g.connect(audioCtx.destination);o.type='square';o.frequency.setValueAtTime(base+i*150,t);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.01,t+.12);o.start(t);o.stop(t+.12)}}
function playRainbowSound(){if(!audioCtx)return;let now=audioCtx.currentTime;[660,880,1100,1320,1760].forEach((f,i)=>{let o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=now+i*.06;o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.01,t+.25);o.start(t);o.stop(t+.25)})}
function playRankUpSound(){if(!audioCtx)return;let now=audioCtx.currentTime;[392,523.25,659.25,880].forEach((f,i)=>{let o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=now+i*.1;o.connect(g);g.connect(audioCtx.destination);o.type='sawtooth';o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.01,t+.35);o.start(t);o.stop(t+.35)})}
function playPuriSound(){if(!audioCtx)return;let now=audioCtx.currentTime;for(let i=0;i<3;i++){let o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=now+i*.08;o.connect(g);g.connect(audioCtx.destination);o.type='triangle';o.frequency.setValueAtTime(300+i*40,t);o.frequency.exponentialRampToValueAtTime(150,t+.06);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.01,t+.06);o.start(t);o.stop(t+.06)}}
function playFartSound(){if(!audioCtx)return;let now=audioCtx.currentTime;for(let i=0;i<3;i++){let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sawtooth';o.frequency.setValueAtTime(90+i*15,now);o.frequency.linearRampToValueAtTime(45,now+.5);g.gain.setValueAtTime(.25,now);g.gain.exponentialRampToValueAtTime(.01,now+.5);o.start(now);o.stop(now+.5)}}
function playOshiiSound(){if(!audioCtx)return;let now=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.setValueAtTime(440,now);o.frequency.exponentialRampToValueAtTime(330,now+.2);g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.01,now+.3);o.start(now);o.stop(now+.3)}

function playJackpotSound(){if(!audioCtx)return;let now=audioCtx.currentTime;[880,1174.66,1567.98,2093].forEach((f,i)=>{let o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=now+i*.05;o.connect(g);g.connect(audioCtx.destination);o.type=i%2===0?'triangle':'sine';o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.01,t+.28);o.start(t);o.stop(t+.28)})}
function playComboBurstSound(c){if(!audioCtx)return;let now=audioCtx.currentTime,base=Math.min(900+c*90,1500);for(let i=0;i<3;i++){let o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=now+i*.045;o.connect(g);g.connect(audioCtx.destination);o.type='square';o.frequency.setValueAtTime(base+i*180,t);g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.01,t+.16);o.start(t);o.stop(t+.16)}}
function playComboAura(x,y){
  const ring=document.createElement('div');
  ring.style.position='absolute'; ring.style.left=(x-18)+'px'; ring.style.top=(y-18)+'px';
  ring.style.width='36px'; ring.style.height='36px'; ring.style.borderRadius='999px';
  ring.style.border='3px solid rgba(255,235,59,.9)'; ring.style.boxShadow='0 0 18px rgba(255,152,0,.9), 0 0 28px rgba(255,0,234,.5)';
  ring.style.pointerEvents='none'; ring.style.zIndex='12'; ring.style.transform='scale(.4)'; ring.style.opacity='1';
  ring.style.transition='transform .45s ease, opacity .45s ease'; $('stage').appendChild(ring);
  requestAnimationFrame(()=>{ring.style.transform='scale(4.8)'; ring.style.opacity='0';}); setTimeout(()=>ring.remove(),500);
}
function spawnComboStars(x,y,count=18){
  const stars=['✨','🌟','💫'];
  for(let i=0;i<count;i++){
    const el=document.createElement('div'); el.className='splash'; el.textContent=stars[i%stars.length];
    el.style.left=x+'px'; el.style.top=y+'px'; el.style.zIndex='12'; $('stage').appendChild(el);
    let a=(i/count)*Math.PI*2+(Math.random()*.3), sp=Math.random()*7+3, vx=Math.cos(a)*sp, vy=Math.sin(a)*sp-2, cx=x, cy=y;
    let loop=setInterval(()=>{vy+=.18; cx+=vx; cy+=vy; el.style.left=cx+'px'; el.style.top=cy+'px'; el.style.opacity=String(Math.max(0,1-cy/520)); if(cy>470||cx<-20||cx>430){clearInterval(loop);el.remove()}},20);
  }
}

function syncStageScale(){
  const shell=$('shell'),controls=$('controls');
  const vw=document.documentElement.clientWidth||innerWidth;
  const top=shell.getBoundingClientRect().top;
  const cvis=getComputedStyle(controls).display!=='none';
  const ch=cvis?controls.getBoundingClientRect().height+12:0;
  const wr=vw-16, hr=innerHeight-top-ch-12;
  const s=Math.max(.5,Math.min(2.2,wr/STAGE_W,hr/STAGE_H));
  document.documentElement.style.setProperty('--s',s.toFixed(3));
  shell.style.width=(STAGE_W*s)+'px'; shell.style.height=(STAGE_H*s)+'px';
}
function stopMove(){keysPressed.ArrowLeft=false;keysPressed.ArrowRight=false;document.querySelectorAll('.cbtn.press').forEach(b=>b.classList.remove('press'))}
function bindTouch(){
  document.querySelectorAll('[data-k]').forEach(btn=>{
    const k=btn.dataset.k;
    btn.addEventListener('pointerdown',e=>{e.preventDefault();initAudio();btn.classList.add('press');if(btn.setPointerCapture&&e.pointerId!==undefined)btn.setPointerCapture(e.pointerId);if(k==='fire'){if(active&&!bulletActive)shootLaser();return}keysPressed[k]=true});
    const rel=e=>{e.preventDefault();btn.classList.remove('press');if(btn.releasePointerCapture&&e.pointerId!==undefined){try{btn.releasePointerCapture(e.pointerId)}catch(_){}}if(k!=='fire')keysPressed[k]=false};
    btn.addEventListener('pointerup',rel);btn.addEventListener('pointercancel',rel);
    btn.addEventListener('lostpointercapture',()=>{btn.classList.remove('press');if(k!=='fire')keysPressed[k]=false});
    btn.addEventListener('contextmenu',e=>e.preventDefault());
  });
  addEventListener('blur',stopMove);
}
addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();initAudio();if(e.key===' '&&active&&!bulletActive)shootLaser();if(e.key==='ArrowLeft'||e.key==='ArrowRight')keysPressed[e.key]=true});
addEventListener('keyup',e=>{if(['ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();keysPressed[e.key]=false});
addEventListener('resize',syncStageScale); addEventListener('orientationchange',syncStageScale);
setInterval(()=>{if(!active)return;if(keysPressed.ArrowLeft)px=Math.max(10,px-8);if(keysPressed.ArrowRight)px=Math.min(350,px+8);$('player').style.left=px+'px'},1000/60);

function start(){
  active=true;bulletActive=false;$('player').textContent='🚀';$('player').style.transform='rotate(0deg) scale(1)';$('player').style.left=px+'px';
  $('msg').textContent='ただしい答えを持つ「うんこ」を撃ち落とせ！';
  $('score').textContent='SCORE: '+String(score).padStart(4,'0');
  $('best').textContent='🏆MAX: '+String(highScore).padStart(4,'0');
  if(isDailyReady()){dailySeed=getDailySeed(); sessionCorrect=0; rewardTier=0; $('msg').textContent='今日の1セット開始！3回正解でごほうび'; }
  updateRankDisplay();
  document.querySelectorAll('.eshot,.big').forEach(e=>e.remove());
  generateInvaders(); clearInterval(attackTimer); attackTimer=setInterval(enemyAutoAttack,3000);
}

function generateQuestion(){
  const rank=RANKS[currentRankIdx];
  const op=rank.ops[Math.random()*rank.ops.length|0];
  const [lo,hi]=rank.range;
  let n1=lo+(Math.random()*(hi-lo+1)|0), n2=lo+(Math.random()*(hi-lo+1)|0);
  if(op==='-'&&n1<n2){const t=n1;n1=n2;n2=t}
  const answer=op==='+'?n1+n2:n1-n2;
  return{n1,n2,op,answer};
}

function generateInvaders(){
  const q=generateQuestion();
  ans=q.answer;
  isRainbowRound=Math.random()<RAINBOW_CHANCE;
  const sign=q.op==='+'?'＋':'－';
  $('question').textContent=`${q.n1} ${sign} ${q.n2} ＝ ？`;
  playPuriSound();

  let choicesArr=[ans];
  while(choicesArr.length<4){
    let f=ans+((Math.random()*7|0)-3);
    if(f>=0 && !choicesArr.includes(f)) choicesArr.push(f);
  }
  choicesArr.sort(()=>Math.random()-.5);
  $('army').innerHTML=''; invadersData=[];
  let pos=[20,110,200,290].sort(()=>Math.random()-.5);

  choicesArr.forEach((val,i)=>{
    let id=`inv_${i}`, rX=pos[i]+((Math.random()*16|0)-8);
    const isBonus=isRainbowRound && val===ans;
    const cls=isBonus?'inv rainbow':'inv';
    const bcls=isBonus?'badge rb':'badge';
    $('army').insertAdjacentHTML('beforeend',`<div id="${id}" class="${cls}" data-val="${val}" style="left:${rX}px;top:10px">💩<span class="${bcls}">${val}</span></div>`);
    setTimeout(()=>{if($(id))invadersData.push({id,val,left:rX,right:rX+55,top:INV_TOP,bottom:INV_TOP+75,bonus:isBonus})},50);
  });
}

function launchWeaponAnimation(power='win'){
  const colors=power==='win'?['#ff0055','#00ffcc','#ffeb3b','#ff9800','#cc00ff','#33ff00','#ffffff','#7cff5b']:['#8a6b00','#6b4c00','#5e3b00'];
  const total=power==='win'?95:10;
  for(let i=0;i<total;i++){
    let s=document.createElement('div'); s.className='spark';
    let sx=px+20, sy=360; s.style.left=sx+'px'; s.style.top=sy+'px';
    s.style.color=colors[i%colors.length]; s.style.background=colors[i%colors.length];
    $('stage').appendChild(s);
    let angle=(i/total)*Math.PI*2+(Math.random()*(power==='win'?0.35:0.12)), speed=Math.random()*(power==='win'?13:5)+(power==='win'?7:2);
    let vx=Math.cos(angle)*speed, vy=Math.sin(angle)*speed-2, cx=sx, cy=sy;
    let loop=setInterval(()=>{
      vy+=(power==='win'?0.18:0.08); cx+=vx; cy+=vy; s.style.left=cx+'px'; s.style.top=cy+'px';
      s.style.opacity = power==='win' ? String(Math.max(0.15, 1 - cy/520)) : String(Math.max(0.1, 0.7 - cy/520));
      if(cy>470||cx<-20||cx>420){clearInterval(loop); s.remove()}
    },20);
  }
}
function explodePoop(sx,sy,big=false){
  const count=big?70:12;
  for(let i=0;i<count;i++){
    const p=document.createElement('div'); p.className='splash'; p.textContent='💩';
    p.style.left=sx+'px'; p.style.top=sy+'px'; $('stage').appendChild(p);
    let vx,vy;
    if(big){let a=(i/count)*Math.PI*2+(Math.random()*.5),sp=Math.random()*8+5;vx=Math.cos(a)*sp;vy=Math.sin(a)*sp-3}
    else{vx=(Math.random()-.5)*14;vy=(Math.random()-.8)*16}
    let cx=sx, cy=sy;
    let loop=setInterval(()=>{
      vy+=.4; cx+=vx; cy+=vy; p.style.left=cx+'px'; p.style.top=cy+'px';
      if(cy>430||cx<-30||cx>430){clearInterval(loop); p.remove()}
    },20);
  }
}
function checkHighScore(){if(score>highScore){highScore=score}}

function shootLaser(){
  bulletActive=true;
  let lX=px+15, lY=340;
  const laserEl=$('laser');
  laserEl.textContent=WEAPONS[currentRankIdx];
  laserEl.classList.toggle('giant',currentRankIdx===3);
  laserEl.style.left=lX+'px'; laserEl.style.bottom='80px'; laserEl.style.display='block';
  let loop=setInterval(()=>{
    lY-=15; laserEl.style.bottom=(STAGE_H-lY)+'px';
    for(let i=0;i<invadersData.length;i++){
      let inv=invadersData[i], el=$(inv.id);
      if(!el || el.innerHTML.includes('💥')) continue;
      if(lX>=inv.left-5 && lX<=inv.right+5 && lY>=inv.top && lY<=inv.bottom+15){
        clearInterval(loop); laserEl.style.display='none'; clearInterval(attackTimer);
        if(inv.val===ans){
          active=false;
          const prevRank=currentRankIdx;
          comboCount++; rankXP++; sessionCorrect++;
          let mult=getComboMultiplier(comboCount), base=100*mult;
          let gain=inv.bonus?Math.round(base*2):Math.round(base);
          score+=gain;
          playWinSound();
          if(inv.bonus) playRainbowSound();
          if(comboCount>=2){ playComboBurstSound(comboCount); playJackpotSound(); } else { playJackpotSound(); }
          checkHighScore(); updateRankDisplay();
          if(currentRankIdx>prevRank) playRankUpSound();
          if(sessionCorrect===2){ $('msg').textContent='あと1回でデイリー達成！'; showComboBadge('あと1回でごほうび！'); }
          if(sessionCorrect===sessionGoal){ rewardTier++; sessionCorrect=0; $('msg').textContent=`🎁 1セット達成！ごほうび解放 レベル${rewardTier}`; showComboBadge(`GOAL CLEAR! +1`); }
          el.innerHTML="<span style='font-size:45px'>💥</span>";
          if(inv.bonus){$('msg').textContent=`🌈 レインボーボーナス！！ SCORE +${gain} 🌈`;showComboBadge(`🌈 x2 BONUS！ +${gain}`)}
          else if(comboCount>=2){$('msg').textContent=`✨ ${comboCount}連続ゲキハ！ SCORE +${gain} ✨`;showComboBadge(`COMBO x${comboCount}！ +${gain}`)}
          else{$('msg').textContent=`✨ ゲキハ成功！ SCORE +${gain} ✨`;showComboBadge(`+${gain}`)}
          explodePoop(lX,lY,true); launchWeaponAnimation('win');
          if(comboCount>=2){playComboAura(lX,lY); spawnComboStars(lX,lY, comboCount>=5?28:20); playComboBurstSound(comboCount);}
          const flash=document.createElement('div'); flash.style.position='absolute'; flash.style.inset='0'; flash.style.pointerEvents='none'; flash.style.zIndex='12'; flash.style.background=comboCount>=3?'radial-gradient(circle at 50% 55%, rgba(255,255,255,.58), rgba(255,235,59,.32) 28%, rgba(255,0,234,.22) 52%, rgba(0,229,255,.12) 66%, rgba(255,255,255,0) 76%)':'radial-gradient(circle at 50% 55%, rgba(255,255,255,.45), rgba(255,235,59,.22) 30%, rgba(255,0,234,.12) 55%, rgba(255,255,255,0) 72%)'; flash.style.opacity='0.95'; flash.style.transition='opacity .45s ease'; $('stage').appendChild(flash); requestAnimationFrame(()=>flash.style.opacity='0'); setTimeout(()=>flash.remove(),500); setTimeout(start,1000);
        } else {
          active=false; playFartSound(); $('player').textContent='🤪💩';
          $('player').style.transform='rotate(180deg) scale(1.5)';
          const near=Math.abs(inv.val-ans)<=NEAR_MISS;
          if(near){playOshiiSound();$('msg').textContent='😲 おしい！もう少し！'}
          else{$('msg').textContent='💨 ぶりゅりゅ！'}
          resetCombo(); score=0; updateRankDisplay(); explodePoop(lX,lY,false); launchWeaponAnimation('miss'); setTimeout(start,1700);
        }
        return;
      }
    }
    if(lY<0){clearInterval(loop); laserEl.style.display='none'; bulletActive=false}
  },10);
}

function enemyAutoAttack(){
  if(!active||invadersData.length===0) return;
  if(Math.random()<.2){
    clearInterval(attackTimer); $('msg').textContent='🚨 警告！ ビッグうんち襲来！！ 🚨'; playSound(80,50,'sawtooth',.3,.8);
    const big=document.createElement('div'); big.className='big'; big.textContent='💩';
    let bX=(Math.random()*240|0)-20, bY=-140; big.style.left=bX+'px'; big.style.top=bY+'px'; $('stage').appendChild(big);
    let loop=setInterval(()=>{
      bY+=10; big.style.top=bY+'px';
      if(bY>=230 && bY<=380){
        let cX=bX+65;
        if(px+20>=cX-60 && px+20<=cX+60){
          clearInterval(loop); big.remove(); active=false; playSound(60,30,'triangle',.5,.8);
          $('player').textContent='💀💩'; $('msg').textContent='😱 巨大うんちに潰された！';
          resetCombo(); score=0; updateRankDisplay(); explodePoop(px+20,300,true); setTimeout(start,2000); return;
        }
      }
      if(bY>=440){clearInterval(loop); big.remove(); start()}
    },15); return;
  }
  let inv=invadersData[Math.random()*invadersData.length|0], el=document.createElement('div');
  el.className='eshot'; el.textContent='💩'; let eX=inv.left+15, eY=INV_TOP+20; el.style.left=eX+'px'; el.style.top=eY+'px'; $('stage').appendChild(el);
  let loop=setInterval(()=>{
    eY+=6; el.style.top=eY+'px';
    if(eY>=350 && eY<=380 && eX>=px-5 && eX<=px+45){
      clearInterval(loop); el.remove(); clearInterval(attackTimer); active=false; playSound(100,40,'triangle',.3,.5);
      $('player').textContent='💀💩'; $('msg').textContent='💨 上からうんちが落ちてきた！';
      resetCombo(); score=0; updateRankDisplay(); explodePoop(px+20,360); setTimeout(start,1500);
    }
    if(eY>=440){clearInterval(loop); el.remove()}
  },15);
}

bindTouch();
syncStageScale();
start();
</script>
